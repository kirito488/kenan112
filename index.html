<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>名侦探柯南性格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 50%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            position: relative;
            padding: 20px;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 15% 85%, rgba(0, 100, 200, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 85% 15%, rgba(200, 0, 50, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(30, 60, 114, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(100, 149, 237, 0.5);
            border-radius: 50%;
            animation: float 12s infinite;
            box-shadow: 0 0 8px rgba(100, 149, 237, 0.6);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 30px;
            width: 100%;
            max-width: 750px;
            position: relative;
        }

        .start-screen-content {
            position: relative;
            z-index: 10;
        }

        .detective-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .detective-icon {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.4), rgba(42, 82, 152, 0.3));
            border: 2px solid rgba(100, 149, 237, 0.4);
            animation: iconFloat 3s ease-in-out infinite;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .detective-icon:nth-child(1) { animation-delay: 0s; }
        .detective-icon:nth-child(2) { animation-delay: 0.5s; }
        .detective-icon:nth-child(3) { animation-delay: 1s; }
        .detective-icon:nth-child(4) { animation-delay: 1.5s; }
        .detective-icon:nth-child(5) { animation-delay: 2s; }

        @keyframes iconFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .title {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #6495ed 0%, #ff4444 50%, #6495ed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 15px;
            letter-spacing: 3px;
            position: relative;
            filter: drop-shadow(0 0 15px rgba(100, 149, 237, 0.4));
            animation: titleGlow 3s ease-in-out infinite;
        }
        
        .title::after {
            content: '名侦探柯南性格测试';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            background: linear-gradient(135deg, #6495ed 0%, #ff4444 50%, #6495ed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(15px);
            opacity: 0.4;
            z-index: -1;
        }

        @keyframes titleGlow {
            0%, 100% {
                filter: drop-shadow(0 0 15px rgba(100, 149, 237, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 30px rgba(100, 149, 237, 0.6)) drop-shadow(0 0 45px rgba(255, 68, 68, 0.3));
            }
        }

        .subtitle-container {
            margin-bottom: 40px;
        }

        .subtitle {
            font-size: 1.15rem;
            color: #b8c5d6;
            margin-bottom: 8px;
            opacity: 0.95;
        }

        .subtitle-detail {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.65);
            margin-top: 8px;
            font-style: italic;
        }

        .start-btn {
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
            border: 2px solid rgba(100, 149, 237, 0.5);
            padding: 16px 55px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(30, 60, 114, 0.5),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .start-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 35px rgba(30, 60, 114, 0.6),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            border-color: rgba(100, 149, 237, 0.8);
        }

        .start-btn:active {
            transform: translateY(-2px) scale(1.01);
        }

        .start-screen-footer {
            margin-top: 50px;
            padding-top: 25px;
            border-top: 1px solid rgba(100, 149, 237, 0.25);
        }

        .footer-text {
            font-size: 0.9rem;
            color: rgba(100, 149, 237, 0.85);
            margin: 0;
            animation: footerGlow 2s ease-in-out infinite;
        }

        @keyframes footerGlow {
            0%, 100% {
                opacity: 0.75;
            }
            50% {
                opacity: 1;
            }
        }

        .quiz-container {
            display: none;
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.08) 0%, rgba(42, 82, 152, 0.04) 100%);
            border-radius: 12px;
            padding: 35px 30px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(100, 149, 237, 0.25);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(30, 60, 114, 0.1);
        }

        .quiz-header {
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.4);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6495ed, #ff4444, #6495ed);
            background-size: 200% 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
            animation: shimmer 2s linear infinite;
            box-shadow: 0 0 8px rgba(100, 149, 237, 0.4);
        }
        
        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }
            100% {
                background-position: 200% 0;
            }
        }

        .question-number {
            background: linear-gradient(135deg, #6495ed 0%, #ff4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.05rem;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .encouragement-text {
            color: rgba(100, 149, 237, 0.85);
            font-size: 0.85rem;
            font-style: italic;
            margin-bottom: 12px;
            animation: fadeIn 0.5s ease;
        }

        .question-text {
            color: #e8eef5;
            font-size: 1.3rem;
            margin-bottom: 35px;
            line-height: 1.7;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 35px;
        }

        .option {
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.12) 0%, rgba(42, 82, 152, 0.06) 100%);
            border: 2px solid rgba(100, 149, 237, 0.2);
            padding: 16px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            color: #d4dce8;
            font-size: 0.98rem;
            min-height: 58px;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 100%;
            position: relative;
            overflow: visible;
        }

        .option::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(100, 149, 237, 0.08), transparent);
            transition: left 0.5s ease;
        }

        .option:hover {
            background: linear-gradient(135deg, rgba(100, 149, 237, 0.18) 0%, rgba(100, 149, 237, 0.08) 100%);
            border-color: rgba(100, 149, 237, 0.5);
            transform: translateX(4px);
            box-shadow: 0 4px 15px rgba(100, 149, 237, 0.15);
        }

        .option:hover::before {
            left: 100%;
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(100, 149, 237, 0.28) 0%, rgba(100, 149, 237, 0.12) 100%);
            border-color: #6495ed;
            box-shadow: 0 0 15px rgba(100, 149, 237, 0.25), inset 0 0 8px rgba(100, 149, 237, 0.1);
        }

        .option-letter {
            display: inline-block;
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            color: #fff;
            border-radius: 50%;
            text-align: center;
            line-height: 34px;
            font-weight: bold;
            margin-right: 14px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(30, 60, 114, 0.4);
            border: 1px solid rgba(100, 149, 237, 0.3);
        }

        .option-feedback {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            color: #fff;
            padding: 7px 14px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 10;
            animation: feedbackSlide 0.4s ease;
            box-shadow: 0 3px 12px rgba(30, 60, 114, 0.4);
            white-space: nowrap;
        }

        @keyframes feedbackSlide {
            0% {
                opacity: 0;
                transform: translateY(-50%) translateX(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .nav-btn {
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.15) 0%, rgba(42, 82, 152, 0.08) 100%);
            border: 2px solid rgba(100, 149, 237, 0.35);
            padding: 12px 35px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #6495ed;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(100, 149, 237, 0.15), transparent);
            transition: left 0.5s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(100, 149, 237, 0.2) 0%, rgba(100, 149, 237, 0.1) 100%);
            border-color: #6495ed;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(100, 149, 237, 0.25);
        }

        .nav-btn:hover:not(:disabled)::before {
            left: 100%;
        }

        .nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.4);
        }

        .nav-btn.primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(30, 60, 114, 0.5);
        }

        .fun-tip {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.8rem;
            text-align: center;
            margin-top: 18px;
            padding: 10px;
            background: rgba(30, 60, 114, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(100, 149, 237, 0.15);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-container {
            display: none;
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.1) 0%, rgba(42, 82, 152, 0.05) 100%);
            border-radius: 12px;
            padding: 45px 35px;
            backdrop-filter: blur(15px);
            border: 2px solid rgba(100, 149, 237, 0.3);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(30, 60, 114, 0.1);
        }

        .result-type {
            font-size: 1.4rem;
            background: linear-gradient(135deg, #6495ed 0%, #ff4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: 3px;
            font-weight: bold;
            position: relative;
            z-index: 1;
        }

        .result-character {
            font-size: 3.2rem;
            background: linear-gradient(135deg, #fff 0%, #6495ed 50%, #ff4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 25px;
            font-weight: bold;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 15px rgba(100, 149, 237, 0.4));
            animation: characterGlow 3s ease-in-out infinite;
        }

        @keyframes characterGlow {
            0%, 100% {
                filter: drop-shadow(0 0 15px rgba(100, 149, 237, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 30px rgba(100, 149, 237, 0.6));
            }
        }

        .personality-analysis {
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.12) 0%, rgba(42, 82, 152, 0.06) 100%);
            border: 2px solid rgba(100, 149, 237, 0.25);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: left;
            line-height: 1.8;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(30, 60, 114, 0.1);
        }

        .personality-analysis::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #6495ed, transparent);
        }

        .personality-analysis-title {
            background: linear-gradient(135deg, #6495ed 0%, #ff4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
        }

        .personality-analysis-text {
            color: #d4dce8;
            font-size: 1.05rem;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.08);
        }

        .character-intro {
            background: linear-gradient(135deg, rgba(30, 60, 114, 0.08) 0%, rgba(42, 82, 152, 0.04) 100%);
            border: 2px solid rgba(100, 149, 237, 0.2);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 35px;
            text-align: left;
            line-height: 1.8;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .character-intro::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(100, 149, 237, 0.5), transparent);
        }

        .character-intro-title {
            background: linear-gradient(135deg, #6495ed 0%, #ff4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
        }

        .character-intro-text {
            color: #d4dce8;
            font-size: 1.05rem;
        }

        .restart-btn {
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            border: 2px solid rgba(100, 149, 237, 0.4);
            padding: 14px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 8px 25px rgba(30, 60, 114, 0.4),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .restart-btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 35px rgba(30, 60, 114, 0.5),
                        inset 0 1px 3px rgba(255, 255, 255, 0.2);
            border-color: rgba(100, 149, 237, 0.6);
        }

        @media (max-width: 768px) {
            .container {
                padding: 18px;
            }

            .title {
                font-size: 2rem;
            }

            .quiz-container, .result-container {
                padding: 22px 18px;
            }

            .question-text {
                font-size: 1.15rem;
                margin-bottom: 28px;
            }

            .option {
                padding: 14px 16px;
                font-size: 0.92rem;
            }

            .nav-btn {
                padding: 11px 22px;
                font-size: 0.9rem;
            }

            .result-type {
                font-size: 1.15rem;
            }

            .result-character {
                font-size: 2.2rem;
            }

            .personality-analysis, .character-intro {
                padding: 18px;
            }

            .personality-analysis-title, .character-intro-title {
                font-size: 1.05rem;
            }

            .personality-analysis-text, .character-intro-text {
                font-size: 0.98rem;
            }
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.7rem;
                letter-spacing: 2px;
            }

            .subtitle {
                font-size: 0.98rem;
            }

            .subtitle-detail {
                font-size: 0.88rem;
            }

            .detective-icons {
                gap: 10px;
                margin-bottom: 18px;
            }

            .detective-icon {
                width: 45px;
                height: 45px;
                font-size: 1.1rem;
            }

            .start-btn {
                padding: 13px 35px;
                font-size: 1.05rem;
            }

            .start-screen-footer {
                margin-top: 35px;
                padding-top: 18px;
            }

            .footer-text {
                font-size: 0.82rem;
            }

            .result-character {
                font-size: 1.9rem;
            }

            .option {
                padding: 13px 15px;
                font-size: 0.9rem;
            }

            .option-letter {
                width: 30px;
                height: 30px;
                line-height: 30px;
                margin-right: 12px;
            }

            .encouragement-text {
                font-size: 0.78rem;
            }

            .fun-tip {
                font-size: 0.72rem;
                padding: 8px;
            }

            .option-feedback {
                font-size: 0.72rem;
                padding: 5px 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div id="start-screen">
            <div class="start-screen-content">
                <div class="detective-icons">
                    <div class="detective-icon">🔍</div>
                    <div class="detective-icon">🎩</div>
                    <div class="detective-icon">🔬</div>
                    <div class="detective-icon">💡</div>
                    <div class="detective-icon">🎭</div>
                </div>
                <h1 class="title">名侦探柯南性格测试</h1>
                <div class="subtitle-container">
                    <p class="subtitle">探索你与哪位角色最相似</p>
                    <p class="subtitle-detail">通过精心设计的问题，发现你的侦探特质</p>
                </div>
                <button class="start-btn" onclick="startSurvey()">开始测试</button>
                <div class="start-screen-footer">
                    <p class="footer-text">🔍 真相只有一个！</p>
                </div>
            </div>
        </div>

        <div id="quiz-screen" class="quiz-container">
            <div class="quiz-header">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="question-number" id="question-number"></div>
                <div class="encouragement-text" id="encouragement-text"></div>
            </div>
            <div class="question-text" id="question-text"></div>
            <div class="options" id="options"></div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prev-btn" onclick="prevQuestion()">上一题</button>
                <button class="nav-btn primary" id="next-btn" onclick="nextQuestion()">下一题</button>
            </div>
            <div class="fun-tip" id="fun-tip"></div>
        </div>

        <div id="result-screen" class="result-container">
            <div class="result-type" id="result-type"></div>
            <div class="result-character" id="result-character"></div>
            <div class="personality-analysis" id="personality-analysis"></div>
            <div class="character-intro" id="character-intro"></div>
            <button class="restart-btn" onclick="restartSurvey()">重新测试</button>
        </div>
    </div>

    <script>
        // 题目数据
        const questions = [
            {
                text: "当你发现一个谜题时，你的第一反应是？",

            "詹姆斯·布莱克": "FBI的高级探员，赤井秀一的上司。他性格沉稳，有着丰富的办案经验，是FBI在日本行动的指挥官。"

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        function startSurvey() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            lastMilestone = 0;
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-number').textContent = `第 ${currentQuestion + 1}/${questions.length} 题`;
            document.getElementById('question-text').textContent = q.text;
            
            const encouragementText = document.getElementById('encouragement-text');
            encouragementText.textContent = encouragements[currentQuestion % encouragements.length];
            
            const funTip = document.getElementById('fun-tip');
            funTip.textContent = funTips[currentQuestion % funTips.length];
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, idx) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                if (answers[currentQuestion] === idx) {
                    optionDiv.classList.add('selected');
                }
                optionDiv.innerHTML = `<span class="option-letter">${letters[idx]}</span>${opt}`;
                optionDiv.onclick = () => selectOption(idx);
                optionsContainer.appendChild(optionDiv);
            });

            updateProgress();
            updateButtons();
        }

        function selectOption(idx) {
            answers[currentQuestion] = idx;
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.toggle('selected', i === idx);
            });
            
            showOptionFeedback(idx);
            
            options[idx].style.transform = 'scale(0.98)';
            setTimeout(() => {
                options[idx].style.transform = '';
            }, 150);
        }

        function showOptionFeedback(selectedIdx) {
            const existingFeedback = document.querySelectorAll('.option-feedback');
            existingFeedback.forEach(el => el.remove());
            
            const options = document.querySelectorAll('.option');
            const selectedOption = options[selectedIdx];
            if (!selectedOption) return;
            
            const feedback = document.createElement('div');
            feedback.className = 'option-feedback';
            feedback.textContent = optionFeedbacks[Math.floor(Math.random() * optionFeedbacks.length)];
            selectedOption.appendChild(feedback);
            
            setTimeout(() => {
                if (feedback.parentNode) {
                    feedback.style.opacity = '0';
                    feedback.style.transition = 'opacity 0.3s ease';
                    setTimeout(() => feedback.remove(), 300);
                }
            }, 1500);
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            
            const milestones = [10, 25, 50, 75, 90, 100];
            const milestoneMessages = {
                10: "🔍 已完成10%！调查刚刚开始~",
                25: "🔍 已完成25%！继续加油，侦探！",
                50: "🔍 已经完成一半了！真相越来越近了！",
                75: "🔍 75%完成！再坚持一下就能破案了！",
                90: "🔍 90%完成！马上就能揭晓结果了！",
                100: "🔍 全部完成！准备揭晓你的角色吧！"
            };
            
            const currentProgress = Math.round(progress);
            if (milestones.includes(currentProgress) && currentProgress > 0) {
                showMilestoneToast(milestoneMessages[currentProgress]);
            }
        }

        let lastMilestone = 0;
        function showMilestoneToast(message) {
            const progress = Math.round(((currentQuestion + 1) / questions.length) * 100);
            if (progress === lastMilestone) return;
            lastMilestone = progress;
            
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: linear-gradient(135deg, rgba(30, 144, 255, 0.95), rgba(220, 20, 60, 0.95));
                color: #fff;
                padding: 20px 40px;
                border-radius: 15px;
                font-weight: bold;
                font-size: 1.2rem;
                z-index: 2000;
                animation: milestonePop 0.5s ease;
                box-shadow: 0 15px 40px rgba(30, 144, 255, 0.5);
                text-align: center;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function updateButtons() {
            document.getElementById('prev-btn').disabled = currentQuestion === 0;
            const nextBtn = document.getElementById('next-btn');
            if (currentQuestion === questions.length - 1) {
                nextBtn.textContent = '完成测试';
            } else {
                nextBtn.textContent = '下一题';
            }
        }

        function nextQuestion() {
            if (answers[currentQuestion] === undefined) {
                alert('请先选择一个选项！');
                return;
            }

            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                finishSurvey();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        function finishSurvey() {
            const optionCounts = [0, 0, 0, 0];
            
            for (let i = 0; i < questions.length; i++) {
                if (answers[i] !== undefined) {
                    optionCounts[answers[i]]++;
                }
            }
            
            let maxCount = -1;
            let maxIndex = 0;
            for (let i = 0; i < optionCounts.length; i++) {
                if (optionCounts[i] > maxCount) {
                    maxCount = optionCounts[i];
                    maxIndex = i;
                }
            }
            
            const type = typeMapping[maxIndex];
            const characters = charactersByType[type];
            const randomIndex = Math.floor(Math.random() * characters.length);
            const character = characters[randomIndex];
            
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('result-type').textContent = type;
            document.getElementById('result-character').textContent = character;
            
            const analysisDiv = document.getElementById('personality-analysis');
            const analysis = personalityAnalyses[type] || "暂无分析";
            analysisDiv.innerHTML = `
                <div class="personality-analysis-title">你的性格分析</div>
                <div class="personality-analysis-text">${analysis}</div>
            `;
            
            const introDiv = document.getElementById('character-intro');
            const intro = characterIntros[character] || "暂无介绍";
            introDiv.innerHTML = `
                <div class="character-intro-title">角色介绍</div>
                <div class="character-intro-text">${intro}</div>
            `;
        }

        function restartSurvey() {
            currentQuestion = 0;
            answers = new Array(questions.length).fill(undefined);
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
        }

        createParticles();
    </script>
